name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: influencer-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: influencer-site

      - name: Build
        run: npm run build
        working-directory: influencer-site
        env:
          NEXT_PUBLIC_BASE_PATH: /Website-Template

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: influencer-site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
